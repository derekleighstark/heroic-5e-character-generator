<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HEROIC 5e Character Dashboard</title><link rel="stylesheet" href="character.css?v=20260629-1"><style>.quick-bar output{display:grid;place-items:center;min-width:46px;height:34px;margin-left:5px;border:1px solid var(--accent);background:#fff;color:#9d2931;font-size:1.35rem;font-weight:1000}</style></head>
